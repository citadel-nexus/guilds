# =============================================================================
# ROUTE DRIFT DETECTION (Auth-Path Integrity)
# =============================================================================
# Addresses: Frontend calling auth-critical endpoints on wrong path prefix,
# causing silent 404 → tier fallback to "Member" → privilege degradation.
# Example: EmailPanel calls /api/auth/me but auth routes live at /v1/auth/me.

NEM-RDRIFT-001:
  title: Route Drift Soft Check
  description: >
    Post-response middleware check detects 404 on auth-critical path patterns.
    Non-blocking — flags the condition, emits NATS event, but does not alter
    the response. Enables real-time detection of frontend/backend route
    prefix mismatches after deploys.
  priority: high
  status: implemented
  file: src/api/middleware/nemesis_inspector.py
  method: NemesisInspectorMiddleware._check_route_drift
  srs: NEM-RDRIFT-001

NEM-RDRIFT-002:
  title: Auth Tier Degradation Alert
  description: >
    When route drift causes an auth endpoint to 404, the frontend silently
    degrades the user tier (e.g. Master → Member) because the catch handler
    falls back to the lowest tier. This SRS triggers a Datadog metric
    (nemesis.l2.route_drift) and NATS alert so ops can detect privilege
    degradation before users report access loss.
  priority: critical
  status: implemented
  file: src/api/middleware/nemesis_inspector.py
  metric: nemesis.l2.route_drift
  nats_subject: citadel.nemesis.threat.route_drift

NEM-RDRIFT-003:
  title: Auth-Critical Path Registry
  description: >
    Configurable set of regex patterns identifying auth-critical endpoints
    (e.g. /auth/me, /auth/access, /auth/register). Route drift detection
    only fires for paths matching these patterns, avoiding false positives
    on intentional 404s (missing resources, deleted pages).
  priority: medium
  status: implemented
  file: src/api/middleware/nemesis_inspector.py
  constant: AUTH_CRITICAL_PATTERNS

NEM-RDRIFT-004:
  title: Route Drift Reflex Integration
  description: >
    ROUTE_DRIFT_DETECTED event emitted to the Reflex event bus, triggering
    alert_guardian + emit_srs_warn_ticket + log_security_event_verbose.
    Enables automated incident response for route-level integrity failures.
  priority: medium
  status: implemented
  file: CITADEL_LLM/reflex/F952_reflex_rules.yaml
  event: ROUTE_DRIFT_DETECTED

