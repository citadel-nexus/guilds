# =============================================================================
# SEVERITY ESCALATION LADDER
# =============================================================================
# Defines automatic escalation rules based on event severity and accumulation.

severity_escalation:
  - level: 1
    name: "Routine Monitoring"
    trigger: "Single WARNING event"
    actions: [A730, A749]
    notification: "safety_team_channel"
    sla: "4_hours"

  - level: 2
    name: "Active Investigation"
    trigger: "ERROR event OR 3+ WARNING events within 1 hour"
    actions: [A710, A731, A734]
    notification: "safety_team_pager"
    sla: "1_hour"

  - level: 3
    name: "Containment Activated"
    trigger: "CRITICAL event OR 2+ ERROR events within 30 minutes"
    actions: [A701, A704, A710, A740]
    notification: "safety_team_lead_pager"
    sla: "15_minutes"

  - level: 4
    name: "Emergency Response"
    trigger: "Multiple CRITICAL events OR containment breach"
    actions: [A700, A711, A713, A740]
    notification: "leadership_emergency_channel"
    sla: "immediate"

  - level: 5
    name: "Existential Response"
    trigger: "Self-improvement OR corrigibility failure OR deception confirmed"
    actions: [A700, A712, A713, A714]
    notification: "board_emergency_channel"
    sla: "immediate"
