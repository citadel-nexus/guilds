# Citadel Lite — Settings & Feature Flags
# Control auto-execution and auto-merge behavior

version: "1.0.0"

# ========================================
# Auto-Execution & Auto-Merge Settings
# ========================================

auto_execution:
  # Enable/disable auto-execution (ON/OFF switch)
  enabled: true

  # Auto-merge settings
  auto_merge:
    # Enable/disable auto-merge after CI success
    enabled: true

    # Maximum risk score for auto-merge (Guardian decision)
    # risk < 0.25: auto-merge
    # 0.25 <= risk < 0.65: human approval required
    # risk >= 0.65: blocked
    max_risk_threshold: 0.25

    # CI wait timeout (seconds)
    ci_wait_timeout: 300  # 5 minutes

    # Merge method (squash, merge, rebase)
    merge_method: squash

    # Auto-merge exclusions (always require human approval)
    exclude_branches:
      - main
      - master
      - production

    exclude_event_types:
      - security_alert
      - deploy_failed

  # Notification settings
  notifications:
    # Slack webhook URL for approval requests
    slack_webhook_url: ""  # Set via SLACK_WEBHOOK_URL env var

    # Notify on auto-merge success
    notify_on_success: true

    # Notify on auto-merge failure
    notify_on_failure: true

# ========================================
# GitHub Settings
# ========================================

github:
  # Default base branch
  default_branch: main

  # PR settings
  pr:
    # Branch prefix for auto-fix PRs
    branch_prefix: citadel-auto-fix

    # PR title template
    title_template: "[AUTO] Fix: {summary}"

    # PR body template
    body_template: |
      ## Auto-Fix by Citadel Lite

      **Event ID**: {event_id}
      **Event Type**: {event_type}
      **Risk Score**: {risk_score}

      ### Root Cause
      {sherlock_diagnosis}

      ### Fix Plan
      {fix_plan}

      ### Verification Steps
      {verification_steps}

      ---
      🤖 This PR was automatically generated by Citadel Lite
      📊 Risk assessment: {risk_score} (Guardian V3)
      ✅ Auto-merge: {auto_merge_enabled}

# ========================================
# AGS (Agent Governance System) Settings
# ========================================

ags:
  # Enable/disable AGS pipeline (constitutional judiciary layer)
  enabled: true

  # Fail-open: if AGS pipeline errors, use Guardian's decision as-is
  fail_open: true

  # Default CAPS profile (fallback when AIS is unavailable)
  default_caps:
    xp: 1000
    tp: 50
    grade: "B"

# ========================================
# AIS (Agent Intelligence System) Settings
# ========================================

ais:
  # Enable/disable AIS XP/TP economy engine
  enabled: true

  # Fail-open: if AIS errors, use CAPS stub defaults
  fail_open: true

  # Initial profile defaults (for new agents)
  initial_profile:
    xp: 1000
    tp: 50
    # Resolves to grade: B (501-2000 XP range)

  # Storage path (relative to project root)
  storage_path: "data/ais/profiles"

  # Action costs (TP required for budget checks)
  action_costs:
    approve_fix:
      xp_cost: 10
      tp_required: 50
    create_pr:
      xp_cost: 20
      tp_required: 70
    deploy:
      xp_cost: 50
      tp_required: 90

  # Reward multipliers (can tune economy balance)
  reward_multipliers:
    tier_0: 1.0
    tier_1: 1.5
    tier_2: 2.5
    tier_3: 5.0
    quality_bonus: 0.5  # 50% XP bonus for verified fixes

  # Critical event types (earn TP)
  critical_events:
    - security_alert
    - deploy_failed
    - payment_timeout
    - api_error_spike

# ========================================
# Safety & Governance
# ========================================

safety:
  # Require human approval for high-risk scenarios
  always_require_approval:
    - severity: critical
    - has_security_vulnerability: true
    - risk_score_gte: 0.25

  # Block auto-execution for dangerous scenarios
  always_block:
    - risk_score_gte: 0.65
    - unknown_event_type: true

# ========================================
# Diagnostics Loop (Blueprint MS-A3/A6)
# ========================================

diagnostics_loop:
  # Enable/disable DiagnosticsLoop integration in OrchestratorV3
  # true にすると本番モードで動作 (PPLX_API_KEY / OAD_PAT が必要)
  enabled: false
  # dry_run=true: no external API calls (Notion / Linear / GitLab)
  dry_run: true
  # Data sources to poll during READ phase
  targets:
    - supabase
    - notion
    - gitlab

# ========================================
# Monitoring & Observability (Phase 26)
# ========================================

monitoring:
  # Enable/disable Prometheus metrics export
  enabled: true

  # Fail-open: if prometheus_client is not installed, silently no-op
  fail_open: true

  # Metric name prefix (all metrics begin with this)
  prefix: "citadel"

  # Enable FastAPI request timing middleware (adds HTTP request histogram)
  include_middleware: false

  # Custom histogram buckets (optional overrides)
  pipeline_duration_buckets: [50, 100, 250, 500, 1000, 2500, 5000, 10000]
  risk_score_buckets: [0.1, 0.25, 0.5, 0.65, 0.8, 1.0]
